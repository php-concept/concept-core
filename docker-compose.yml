services:
  app:
    build: .
    container_name: concept_core
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/var/www/html
    environment:
      - MYSQL_HOST=db
    depends_on:
      - db

  db:
    image: mysql:8.4
    command: --mysql-native-password=ON
    container_name: concept_core_db
    restart: always
    environment:
      MYSQL_DATABASE: concept_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3396:3396"